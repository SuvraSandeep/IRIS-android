name: Build IRIS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Build APK via Kivy Docker image
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/iris:/home/user/hostcwd \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IRIS-debug-apk
          path: iris/bin/*.apk
          if-no-files-found: error

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: iris/build.log
