name: Build IRIS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            libncurses5-dev libffi-dev \
            libssl-dev libbz2-dev \
            libsqlite3-dev zlib1g-dev \
            aidl

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager --install "build-tools;34.0.0" "platforms;android-33" "platform-tools"

      - name: Install Buildozer + Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.0

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('iris/buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build APK
        working-directory: iris
        run: |
          buildozer android debug 2>&1 | tee build.log
          echo "--- BUILD COMPLETE ---"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: IRIS-debug-apk
          path: iris/bin/*.apk
          if-no-files-found: error

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: iris/build.log
