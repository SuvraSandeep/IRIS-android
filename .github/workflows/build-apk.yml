name: Build IRIS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            libncurses5-dev libffi-dev \
            libssl-dev libbz2-dev \
            libsqlite3-dev zlib1g-dev \
            ccache

      - name: Install Buildozer + Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.0

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('iris/buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build APK
        working-directory: iris
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: 1
          BUILDOZER_WARN_ON_ROOT: 0
        run: |
          buildozer android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IRIS-debug-apk
          path: iris/bin/*.apk
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: iris/build.log
